<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAPokéDex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>WAPokéDex</h1>
        <nav>
            <a href="trainer.html" class="nav-link">Create Trainer Profile</a>
        </nav>
        <button id="theme-toggle">Toggle Dark Mode</button>
    </header>
    <main>
        <section id="search-filter">
            <input type="text" id="search" placeholder="Search Pokémon by name...">
            <select id="type-filter">
                <option value="">All Types</option>
                <!-- Types will be populated by JS -->
            </select>
            <select id="sort">
                <option value="id">Sort by ID</option>
                <option value="name">Sort by Name</option>
            </select>
        </section>
        <section id="pokemon-list">
            <!-- Pokémon cards will be inserted here -->
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
